services:
    redis:
        image: redis:8.6-alpine
        ports:
            - 6379:6379
    valkey:
        image: valkey/valkey:8-alpine
        ports:
            - 16379:6379
    vault:
        image: hashicorp/vault:1.21
        ports:
            - 8200:8200
        environment:
            - VAULT_DEV_ROOT_TOKEN_ID=myroot
