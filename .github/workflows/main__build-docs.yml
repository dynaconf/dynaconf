name: Build Documentation

on:
  workflow_call:
    inputs:
      release-tag:
        description: "Release tag (e.g. 3.2.1)"
        required: false
        type: string
    outputs:
      docs-artifact:
        description: "Name of the uploaded documentation artifact"
        value: "docs-build"
      release-notes-artifact:
        description: "Name of the uploaded release notes artifact"
        value: "release-notes"

jobs:
  docs-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Checkout release tag
        if: ${{ inputs.release-tag != '' }}
        run: |
          git checkout ${{ inputs.release-tag }}

      - name: Build documentation
        run: |
          make docs

      - name: Upload documentation artifact
        uses: actions/upload-artifact@v4
        with:
          name: "docs-build"
          path: site/
          retention-days: 1

      - name: Generate release notes
        if: ${{ inputs.release-tag != '' }}
        run: |
          uv run --with git-changelog git-changelog --release-notes > release-notes.md

      - name: Upload release notes artifact
        if: ${{ inputs.release-tag != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: "release-notes"
          path: release-notes.md
          retention-days: 1
