name: CI

on:
  # Triggers the workflow on push event for the master branch
  push:
    branches: [master]
    paths-ignore: # run if anything different from these is modified
      - "docs/**"
      - "mkdocs.yml"
  # Triggers the workflow on pull_request event for the master branch
  pull_request:
    branches: [master]
    paths-ignore:
      - "docs/**"
      - "mkdocs.yml"
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# When a Push is made on an existing branch/PR
# it cancels any pre running job and
# let only the latest executing
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}

jobs:
  docs:
    uses: ./.github/workflows/main__build-docs.yml

  lint:
    uses: ./.github/workflows/main__lint.yml

  build:
    needs: lint
    uses: ./.github/workflows/main__build-dist.yml

  tests:
    needs: build
    uses: ./.github/workflows/main__test.yml
    with:
      dist-artifact: ${{ needs.build.outputs.dist-artifact }}
      python_minimal: '["3.9", "3.13"]'
      python_full: '["3.9", "3.10", "3.11", "3.12", "3.13"]'
      python_latest: '3.13'
    secrets: inherit

  benchmark:
    needs: build
    if: github.event_name == 'pull_request'
    uses: ./.github/workflows/main__benchmark.yml

  checkpoint:
    runs-on: ubuntu-latest
    needs:
      - lint
      - build
      - docs
      - tests
    steps:
      - name: All tests has passed
        run: echo "All tests has passed"
