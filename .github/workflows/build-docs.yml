name: Build Documentation

on:
  workflow_call:
    inputs:
      release-tag:
        description: "Release tag (e.g. 3.2.1)"
        required: false
        type: string
    outputs:
      docs-artifact:
        description: "Name of the uploaded documentation artifact"
        value: "docs-build"

jobs:
  docs-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ inputs.release-tag || github.ref }}

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Build documentation
        run: uv run make docs

      - name: Upload documentation artifact
        uses: actions/upload-artifact@v7
        with:
          name: "docs-build"
          path: site/
          retention-days: 1

