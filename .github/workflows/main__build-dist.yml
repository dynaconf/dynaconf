name: Build Distribution

on:
  workflow_call:
    inputs:
      release-tag:
        description: "Release tag (e.g. 3.2.1)"
        required: false
        type: string
    outputs:
      dist-artifact:
        description: "Name of the uploaded distribution artifact"
        value: "dist-build"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          # build requires the lowerbound python we support
          python-version: "3.9"
      - name: Install uv
        uses: astral-sh/setup-uv@v6
      - name: Install build dependencies
        run: |
          uv export --no-hashes --only-group release > requirements-release.txt
          pip install --user -r requirements-release.txt
      - name: Build wheel
        run: make dist
      - name: Run health check
        run: .github/scripts/dist-health-check.sh
      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: "dist-build"
          path: dist/
          if-no-files-found: "error"
          overwrite: true
          retention-days: 1
